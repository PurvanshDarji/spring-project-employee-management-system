<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="header">

<header class="header d-flex justify-content-between align-items-center px-4 py-2">

 <div class="brand">
        <a th:href="@{/}"><img src="/Image/logo.png" alt="Logo" height="100"></a>
        </div>

    <div class="nav-btns d-flex gap-3">

        <a th:href="@{/}" class="text-decoration-none">Home</a>

        <a th:href="@{/contact}" class="text-decoration-none">Contact</a>

        <a th:href="@{/login}" class="text-decoration-none">Login</a>

        <!-- ✅ Feedback Button -->
        <a href="javascript:void(0)"
           onclick="showWarning()"
           class="text-decoration-none">
            Feedback
        </a>

        <a th:href="@{/faq}" class="text-decoration-none">FAQ</a>

        <a th:href="@{/about}" class="text-decoration-none">About</a>

    </div>

</header>

<!-- ===== LOGIN REQUIRED POPUP ===== -->

<div id="loginPopup" class="popup-overlay">

    <div class="popup-box">

        <h3>Login Required</h3>

        <p>Please login first to access feedback panel.</p>

        <button onclick="closePopup()">OK</button>

    </div>

</div>

<!-- ===== STYLE ===== -->

<style>

.popup-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-box{
    background:#f2f2f2;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:350px;
}

.popup-box h3{
    color:#ff4d4d;
}

.popup-box button{
    background:#ff4d4d;
    color:white;
    border:none;
    padding:10px 25px;
    border-radius:8px;
    margin-top:15px;
}

</style>

<!-- ===== SCRIPT ===== -->

<script>

function showWarning(){

    let isLoggedIn = false; 
    // future me session check laga sakte ho

    if(!isLoggedIn){
        document.getElementById("loginPopup").style.display="flex";
    }
    else{
        window.location.href="/feedback";
    }
}

function closePopup(){
    document.getElementById("loginPopup").style.display="none";
}

</script>

</div>

</body>
</html>
