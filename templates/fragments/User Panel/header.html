<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="userHeader">

    <aside class="sidebar d-flex flex-column"
           style="min-height:100vh; width:230px; background:#1f2335; padding:20px; color:white;">

        <div class="brand text-center fw-bold mb-4" style="font-size:20px;">
            EMS Panel
        </div>

        <a th:href="@{/employee/dashboard}" style="color:white; text-decoration:none; margin-bottom:12px;">
            🏠 Dashboard
        </a>

        <a th:href="@{/employee/profile}" style="color:white; text-decoration:none; margin-bottom:12px;">
            👤 My Profile
        </a>

        <a th:href="@{/employee/insights}" style="color:white; text-decoration:none; margin-bottom:12px;">
            📊 My Insights
        </a>
        
        <a th:href="@{/employee/notices}" style="color:white; text-decoration:none; margin-bottom:12px;">
            📝 Notice
        </a>

        <a th:href="@{/employee/salary}" style="color:white; text-decoration:none; margin-bottom:12px;">
            💰 Salary Status
        </a>

        <a th:href="@{/employee/leave}" style="color:white; text-decoration:none; margin-bottom:12px;">
            📝 Leave Request
        </a>

        <a th:href="@{/employee/feedback}" style="color:white; text-decoration:none; margin-bottom:12px;">
            💬 Feedback
        </a>

        <a th:href="@{/employee/attendance}" style="color:white; text-decoration:none; margin-bottom:12px;">
            📊 Attendance
        </a>

        <!-- Logout Button -->
      <div style="margin-top:auto; display:flex; justify-content:center;">

<button id="logoutBtn"
    style="
    position:relative;
    width:170px;
    height:50px;
    background:#1f2335;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    overflow:hidden;
    perspective:300px;
    ">

    <span style="position:relative; z-index:5;">Logout</span>

    <!-- Doorway -->
    <svg viewBox="0 0 100 100"
         style="position:absolute; right:18px; bottom:8px; width:34px; fill:#f4f7ff; z-index:1;">
        <path d="M93.4 86.3H58.6c-1.9 0-3.4-1.5-3.4-3.4V17.1c0-1.9 1.5-3.4 3.4-3.4h34.8c1.9 0 3.4 1.5 3.4 3.4v65.8c0 1.9-1.5 3.4-3.4 3.4z"/>
    </svg>

    <!-- Door -->
    <svg id="door"
         viewBox="0 0 100 100"
         style="
         position:absolute;
         right:18px;
         bottom:8px;
         width:34px;
         fill:#4371f7;
         transform-origin:right center;
         transform:rotateY(0deg);
         transition:transform 0.5s ease;
         z-index:3;
         ">
        <path d="M93.4 86.3H58.6c-1.9 0-3.4-1.5-3.4-3.4V17.1c0-1.9 1.5-3.4 3.4-3.4h34.8c1.9 0 3.4 1.5 3.4 3.4v65.8c0 1.9-1.5 3.4-3.4 3.4z"/>
        <circle cx="66" cy="50" r="3.7"/>
    </svg>

    <!-- Man -->
    <svg id="man"
         viewBox="0 0 100 100"
         style="
         position:absolute;
         right:40px;
         bottom:12px;
         width:28px;
         fill:red;
         transition:transform 0.5s ease, opacity 0.5s ease;
         z-index:2;
         ">

        <circle cx="52" cy="30" r="6"/>
        <path d="M50 40 L50 65"/>
        <path d="M50 50 L40 60"/>
        <path d="M50 50 L60 60"/>
        <path d="M50 65 L42 80"/>
        <path d="M50 65 L58 80"/>

    </svg>

</button>

</div>

    </aside>

</div>

</body>
</html>
