<div th:fragment="userFooter">

    <footer class="w-100 text-center py-3 mt-4">
        © 2026 Employee Management System • Auto Attendance System
    </footer>

    <!-- ✅ Floating Chat Button -->
    <div id="chatBtn" onclick="toggleChat()">💬</div>

    <!-- ✅ Chat Window -->
    <div id="chatWindow">
        <div id="chatHeader">
            <span>🤖 EMS Assistant</span>
            <button onclick="toggleChat()">✕</button>
        </div>
        <div id="chatMessages">
            <div class="bot-msg">
                Namaste! 👋 I am your EMS Assistant!<br>
                Ask me about Attendance, Salary, Leaves or anything! 😊
            </div>
        </div>
        <div id="chatInput">
            <input type="text" id="chatBox"
                   placeholder="Ask something..."
                   onkeypress="if(event.key==='Enter') sendMsg()"/>
            <button onclick="sendMsg()">➤</button>
        </div>
    </div>

    <style>
    #chatBtn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #4f46e5, #6366f1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        cursor: pointer;
        box-shadow: 0 8px 25px rgba(79,70,229,0.5);
        z-index: 9999;
        transition: transform .2s;
    }
    #chatBtn:hover { transform: scale(1.1); }

    #chatWindow {
        position: fixed;
        bottom: 100px;
        right: 30px;
        width: 360px;
        height: 480px;
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        display: none;
        flex-direction: column;
        z-index: 9998;
        overflow: hidden;
    }

    #chatHeader {
        background: linear-gradient(135deg, #4f46e5, #6366f1);
        color: #fff;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 600;
        font-size: 15px;
    }
    #chatHeader button {
        background: none;
        border: none;
        color: #fff;
        font-size: 18px;
        cursor: pointer;
    }

    #chatMessages {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #f8fafc;
    }

    .bot-msg {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 14px 14px 14px 0;
        padding: 10px 14px;
        font-size: 13px;
        color: #0f172a;
        max-width: 85%;
        line-height: 1.5;
    }

    .user-msg {
        background: linear-gradient(135deg, #4f46e5, #6366f1);
        color: #fff;
        border-radius: 14px 14px 0 14px;
        padding: 10px 14px;
        font-size: 13px;
        max-width: 85%;
        align-self: flex-end;
    }

    .typing {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 14px 14px 14px 0;
        padding: 10px 14px;
        font-size: 13px;
        color: #94a3b8;
        max-width: 85%;
    }

    #chatInput {
        display: flex;
        padding: 12px;
        gap: 8px;
        border-top: 1px solid #e2e8f0;
        background: #fff;
    }

    #chatBox {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        font-size: 13px;
        outline: none;
    }

    #chatInput button {
        background: linear-gradient(135deg, #4f46e5, #6366f1);
        color: #fff;
        border: none;
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
    }
    </style>

    <script>
    let sessionId = "session-" + Math.random().toString(36).substr(2, 9);
    const CHAT_API = "http://localhost:8082/api/chatbot/ask";

    function toggleChat() {
        let win = document.getElementById("chatWindow");
        win.style.display = win.style.display === "flex" ? "none" : "flex";
        if (win.style.display === "flex") {
            document.getElementById("chatBox").focus();
        }
    }

    function sendMsg() {
        let input = document.getElementById("chatBox");
        let msg   = input.value.trim();
        if (!msg) return;

        addMsg(msg, "user-msg");
        input.value = "";

        let typing = addMsg("Typing...", "typing");

        fetch(CHAT_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                message: msg,
                sessionId: sessionId
            })
        })
        .then(res => res.json())
        .then(data => {
            typing.remove();
            addMsg(data.reply, "bot-msg");
        })
        .catch(() => {
            typing.remove();
            addMsg("Sorry, kuch error hua. Dobara try karo! 🙏", "bot-msg");
        });
    }

    function addMsg(text, cls) {
        let msgs = document.getElementById("chatMessages");
        let div  = document.createElement("div");
        div.className = cls;
        div.innerText = text;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
        return div;
    }
    </script>

</div>
