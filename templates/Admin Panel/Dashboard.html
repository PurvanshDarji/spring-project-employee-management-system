<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMS Admin Dashboard</title>


<link rel="stylesheet" th:href="@{/CSS/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/CSS/Admin Panel/Dashboard.css}">

</head>

<body>

<div class="layout">

    <!-- Admin Sidebar Fragment -->
    <div th:replace="fragments/Admin Panel/header :: adminHeader"></div>

    <!-- Main -->
    <div class="main">

        <div class="topbar">
            <div>
                <h1>Welcome, Admin 👋</h1>
                <div class="clock" id="clock"></div>
            </div>
            <div class="profile">
                <span>Administrator</span>
                <img src="https://i.pravatar.cc/150?img=12">
            </div>
        </div>

        <div class="cards">

<div class="card">
<h3>Total Employees</h3>
<p th:text="${emp}">0</p>
</div>

<div class="card">
<h3>Departments</h3>
<p th:text="${dept}">0</p>
</div>

<div class="card">
<h3>Present Today</h3>
<p th:text="${present}">0</p>
</div>

<div class="card">
<h3>On Leave</h3>
<p th:text="${leave}">0</p>
</div>

</div>

        <div class="dashboard-grid">

            <div class="section">
                <h2>Recent Employees</h2>
                <table class="table">

<tr>
<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Designation</th>
</tr>

<tr th:each="emp : ${employees}">
<td th:text="${emp.id}"></td>
<td th:text="${emp.name}"></td>
<td th:text="${emp.department}"></td>
<td th:text="${emp.designation}"></td>
</tr>

</table>
            </div>

            <div class="section">
                <h2>Quick Actions</h2>

                <div class="actions">
                    <a th:href="@{/admin/add-employee}">
                        <div class="action-box">➕ Add New Employee</div>
                    </a>
                    <div class="action-box">📊 Generate Report</div>
                    <div class="action-box">📅 Mark Attendance</div>
                    <div class="action-box">💰 Process Payroll</div>
                </div>

                <div class="progress">
                    <h3>Monthly Attendance Rate</h3>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress">0%</div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Admin Footer Fragment -->
        
    </div>

</div>
<div th:replace="fragments/Admin Panel/footer :: adminFooter"></div>

<script th:src="@{/JavaScript/Admin Panel/Dashboard.js}"></script>

</body>
</html>
