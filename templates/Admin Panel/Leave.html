<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave Management | EMS Admin</title>

<link rel="stylesheet" th:href="@{/CSS/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/CSS/Admin Panel/Leave.css}">
</head>

<body>

<div class="layout">
    <!-- Admin Sidebar Fragment -->
    <div th:replace="fragments/Admin Panel/header :: adminHeader"></div>

    <!-- Main -->
    <div class="main">
        <div class="topbar">
            <h1>Leave Management</h1>
            <span>Approve / Reject Employee Leave (<span id="pendingCount">0</span> Pending)</span>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between">
                <h2>Leave Requests</h2>
                <button class="btn btn-primary btn-sm" onclick="leaveManager.loadLeaves()">
                    🔄 Refresh
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Employee</th>
                            <th>Department</th>
                            <th>From</th>
                            <th>To</th>
                            <th>Reason</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leaveTable">
                        <tr>
                            <td colspan="8" class="text-center">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                Loading leaves...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Admin Footer Fragment -->
        <div th:replace="fragments/Admin Panel/footer :: adminFooter"></div>
    </div>
</div>

<!-- 🔥 TOAST NOTIFICATION -->
<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="toast" class="toast" role="alert"></div>
</div>

<!-- 🔥 REJECT MODAL -->
<div class="modal fade" id="rejectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">❌ Reject Leave Request</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">Rejection Reason <span class="text-danger">*</span></label>
                    <textarea id="rejectReason" class="form-control" rows="4" 
                              placeholder="Enter clear reason for rejection..." required></textarea>
                    <div class="form-text">Reason will be shown to employee</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="confirmReject" class="btn btn-danger">
                    <i class="fas fa-times me-1"></i>Reject Leave
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 🔥 BOOTSTRAP JS + YOUR SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/JavaScript/Admin Panel/Leave.js}"></script>

</body>
</html>
